<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>GeoQuest — The Endless Geography Game</title>
  <meta name="description" content="GeoQuest: an endless, ever-changing geography game with dozens of modes, custom modes, a season pass and tons of rewards. EN / ES.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://flagcdn.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- App container con estilo de móvil -->
  <div id="app" class="app">

    <!-- ===== TOP BAR ===== -->
    <header class="topbar" id="topbar">
      <div class="topbar-left">
        <span class="avatar-chip" id="topAvatar">🧭</span>
        <div class="topbar-info">
          <span class="topbar-name" id="topName">Explorer</span>
          <span class="topbar-title" id="topTitle">Rookie</span>
        </div>
      </div>
      <div class="topbar-right">
        <span class="coin-pill"><i class="fa-solid fa-coins"></i> <span id="topCoins">0</span></span>
        <span class="lvl-pill" id="topLevel">Lv 1</span>
      </div>
    </header>

    <!-- ===== SCREENS ===== -->
    <main class="screens" id="screens">

      <!-- HOME -->
      <section class="screen active" id="screen-home" data-screen="home"></section>

      <!-- MODES -->
      <section class="screen" id="screen-play" data-screen="play"></section>

      <!-- GAME (overlay-like, fullscreen) -->
      <section class="screen" id="screen-game" data-screen="game"></section>

      <!-- RESULTS -->
      <section class="screen" id="screen-result" data-screen="result"></section>

      <!-- SEASON PASS -->
      <section class="screen" id="screen-pass" data-screen="pass"></section>

      <!-- LOCKER -->
      <section class="screen" id="screen-shop" data-screen="shop"></section>

      <!-- PROFILE -->
      <section class="screen" id="screen-profile" data-screen="profile"></section>

      <!-- CUSTOM BUILDER -->
      <section class="screen" id="screen-builder" data-screen="builder"></section>

      <!-- COIN SHOP -->
      <section class="screen" id="screen-coinshop" data-screen="coinshop"></section>

    </main>

    <!-- ===== BOTTOM NAV ===== -->
    <nav class="bottom-nav" id="bottomNav">
      <button class="nav-btn active" data-nav="home">
        <i class="fa-solid fa-house"></i><span data-i18n="nav_home">Home</span>
      </button>
      <button class="nav-btn" data-nav="play">
        <i class="fa-solid fa-gamepad"></i><span data-i18n="nav_play">Play</span>
      </button>
      <button class="nav-btn nav-play-fab" data-nav="quickplay" aria-label="Quick play">
        <i class="fa-solid fa-bolt"></i>
      </button>
      <button class="nav-btn" data-nav="pass">
        <i class="fa-solid fa-medal"></i><span data-i18n="nav_pass">Pass</span>
      </button>
      <button class="nav-btn" data-nav="shop">
        <i class="fa-solid fa-shirt"></i><span data-i18n="nav_shop">Locker</span>
      </button>
    </nav>
  </div>

  <!-- ===== TOAST / NOTIFICATION LAYER ===== -->
  <div class="toast-layer" id="toastLayer"></div>

  <!-- ===== MODAL LAYER ===== -->
  <div class="modal-overlay" id="modalOverlay" hidden>
    <div class="modal" id="modalBox"></div>
  </div>

  <!-- Scripts (orden importa) -->
  <script src="js/countries.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/rewards.js"></script>
  <script src="js/state.js"></script>
  <script src="js/game.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
